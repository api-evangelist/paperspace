name: paperspace-container-registries-container-registries
description: |
  Naftiko capability for managing Paperspace container registry credentials
  used by Deployments.
api: paperspace-container-registries-api
operations:
- listContainerRegistries
- createContainerRegistry
- getContainerRegistry
- updateContainerRegistry
- deleteContainerRegistry
- testContainerRegistryConnection
auth:
  type: bearer
  header: Authorization
  prefix: Bearer
  env: PAPERSPACE_API_TOKEN
