name: paperspace-storage-shared-drives
description: |
  Naftiko capability for Paperspace storage — shared drives, snapshots, and
  external storage provider configuration plus utilization breakdown.
api: paperspace-storage-api
operations:
- listSharedDrives
- createSharedDrive
- getSharedDrive
- updateSharedDrive
- deleteSharedDrive
- listSnapshots
- createSnapshot
- getSnapshot
- updateSnapshot
- deleteSnapshot
- restoreSnapshot
- listStorageProviders
- createStorageProvider
- getStorageProvider
- updateStorageProvider
- deleteStorageProvider
- getStorageUtilization
auth:
  type: bearer
  header: Authorization
  prefix: Bearer
  env: PAPERSPACE_API_TOKEN
