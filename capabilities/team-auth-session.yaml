name: paperspace-team-auth-session
description: |
  Naftiko capability for Paperspace authentication session, team members, and
  team secrets.
api: paperspace-team-auth-api
operations:
- getSession
- listTeamMembers
- updateTeamMember
- removeTeamMember
- listTeamSecrets
- createTeamSecret
- getTeamSecret
- updateTeamSecret
- deleteTeamSecret
auth:
  type: bearer
  header: Authorization
  prefix: Bearer
  env: PAPERSPACE_API_TOKEN
