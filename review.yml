decision: >-
  Skip AsyncAPI specification — no public WebSocket, SSE, or webhook channel
  exists to model. Re-evaluate if DigitalOcean publishes a Paperspace events
  / streaming surface (deployment-run logs, machine-state events, or dataset
  version notifications) with self-serve documentation.
