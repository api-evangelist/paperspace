aid: paperspace
name: Paperspace
reviewed: '2026-05-29'
reviewer: Kin Lane
scope: Public WebSocket / streaming API availability
finding: >-
  No public WebSocket or streaming API documented — Paperspace (now a
  DigitalOcean product) exposes a synchronous REST surface only at
  api.paperspace.com/v1 for machines, deployments, projects, datasets,
  networking, storage, templates, container registries, models, and team /
  authentication.
details: >-
  Paperspace, acquired by DigitalOcean in 2023, publishes its full API surface
  under the DigitalOcean documentation site at
  docs.digitalocean.com/reference/paperspace/api-reference/. Every documented
  resource — Machines, Deployments, Projects, Datasets, Private Networks,
  Public IPs, Shared Drives, Snapshots, Storage Providers, OS Templates,
  Custom Templates, Startup Scripts, Container Registries, Models, Teams,
  Team Members, Secrets, and Auth Session — is a request/response REST
  endpoint authenticated with a team-scoped Bearer API key. There is no
  WebSocket endpoint, no Server-Sent Events channel, no AsyncAPI document,
  and no documented webhook surface. The closest streaming-adjacent feature
  is the Machines API "desktop streaming configuration" property, which
  controls in-product remote-desktop streaming for a virtual machine — it
  configures a session, it is not an API channel that emits events to
  integrators. Deployment runs, metrics, and logs are surfaced as REST
  pull endpoints, not as a streaming feed. Real-time machine state, job
  status, deployment health, and dataset version events must therefore be
  polled. Paperspace also does not inherit DigitalOcean's webhook or event
  streaming surfaces — the Paperspace API is documented as a distinct
  product family under the DigitalOcean docs umbrella.
